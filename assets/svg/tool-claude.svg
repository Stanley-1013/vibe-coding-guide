<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- AI Brain/head outline -->
  <circle cx="100" cy="90" r="50" fill="url(#aiGrad)" opacity="0.2"/>
  <circle cx="100" cy="90" r="45" stroke="url(#aiGrad)" stroke-width="4" fill="none"/>

  <!-- Neural network nodes -->
  <circle cx="80" cy="75" r="6" fill="#667eea"/>
  <circle cx="120" cy="75" r="6" fill="#667eea"/>
  <circle cx="100" cy="90" r="6" fill="#764ba2"/>
  <circle cx="85" cy="105" r="5" fill="#667eea"/>
  <circle cx="115" cy="105" r="5" fill="#667eea"/>

  <!-- Neural connections -->
  <line x1="80" y1="75" x2="100" y2="90" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  <line x1="120" y1="75" x2="100" y2="90" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="90" x2="85" y2="105" stroke="#764ba2" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="90" x2="115" y2="105" stroke="#764ba2" stroke-width="2" opacity="0.5"/>

  <!-- Code terminal below -->
  <rect x="50" y="150" width="100" height="35" rx="5" fill="url(#aiGrad)" opacity="0.8"/>

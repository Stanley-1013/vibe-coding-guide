<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Clipboard -->
  <rect x="50" y="40" width="100" height="130" rx="10" fill="white" stroke="url(#checkGrad)" stroke-width="4"/>

  <!-- Clip top -->
  <rect x="85" y="30" width="30" height="20" rx="5" fill="url(#checkGrad)"/>

  <!-- Checklist items -->
  <!-- Item 1 - checked -->
  <circle cx="70" cy="70" r="8" stroke="url(#checkGrad)" stroke-width="2" fill="url(#checkGrad)" opacity="0.2"/>
  <path d="M 67 70 L 69.5 73 L 74 67" stroke="#667eea" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="85" y1="70" x2="130" y2="70" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>

  <!-- Item 2 - checked -->
  <circle cx="70" cy="100" r="8" stroke="url(#checkGrad)" stroke-width="2" fill="url(#checkGrad)" opacity="0.2"/>
  <path d="M 67 100 L 69.5 103 L 74 97" stroke="#667eea" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="85" y1="100" x2="130" y2="100" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>

  <!-- Item 3 - unchecked -->
  <circle cx="70" cy="130" r="8" stroke="url(#checkGrad)" stroke-width="2" fill="white"/>
  <line x1="85" y1="130" x2="130" y2="130" stroke="#c3cfe2" stroke-width="2" stroke-linecap="round"/>

  <!-- Item 4 - unchecked -->
  <circle cx="70" cy="150" r="8" stroke="url(#checkGrad)" stroke-width="2" fill="white"/>
  <line x1="85" y1="150" x2="115" y2="150" stroke="#c3cfe2" stroke-width="2" stroke-linecap="round"/>
</svg>

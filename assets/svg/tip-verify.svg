  <!-- Small decorative circles -->
  <circle cx="60" cy="60" r="4" fill="#667eea" opacity="0.6"/>
  <circle cx="140" cy="60" r="4" fill="#764ba2" opacity="0.6"/>
  <circle cx="100" cy="150" r="4" fill="#f093fb" opacity="0.6"/>

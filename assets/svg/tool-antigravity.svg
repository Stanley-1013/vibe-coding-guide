<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rocket body -->
  <ellipse cx="100" cy="100" rx="30" ry="70" fill="url(#rocketGrad)"/>

  <!-- Rocket nose -->
  <path d="M 85 30 L 100 10 L 115 30 Z" fill="#764ba2"/>

  <!-- Window -->
  <circle cx="100" cy="80" r="15" fill="white" opacity="0.9"/>
  <circle cx="100" cy="80" r="10" fill="#667eea" opacity="0.3"/>

  <!-- Fins -->
  <path d="M 70 120 L 60 140 L 85 130 Z" fill="#667eea"/>
  <path d="M 130 120 L 140 140 L 115 130 Z" fill="#667eea"/>

  <!-- Flame/exhaust -->
  <path d="M 85 170 L 100 190 L 115 170 L 110 175 L 100 185 L 90 175 Z" fill="#f093fb" opacity="0.8"/>
  <path d="M 90 175 L 100 185 L 110 175 L 105 178 L 100 182 L 95 178 Z" fill="#f6ad55" opacity="0.7"/>

  <!-- Stars around -->
  <circle cx="40" cy="50" r="3" fill="#667eea" opacity="0.6"/>
  <circle cx="160" cy="60" r="2" fill="#764ba2" opacity="0.6"/>
  <circle cx="50" cy="140" r="2" fill="#f093fb" opacity="0.6"/>
  <circle cx="150" cy="130" r="3" fill="#667eea" opacity="0.6"/>
</svg>
